org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Stabilize native/CMake builds on Windows by avoiding parallel access
# to generated cxx timing/log files.
org.gradle.parallel=false
org.gradle.configureondemand=false
org.gradle.workers.max=1
org.gradle.vfs.watch=false
org.gradle.daemon=false

# Disable parallel JSON/metadata generation for externalNativeBuild (CMake).
android.enableParallelJsonGen=false

# Workaround for Windows mixed-drive Kotlin incremental cache issue
# (project on D:, Pub cache on C:).
kotlin.incremental=false
kotlin.incremental.useClasspathSnapshot=false
kotlin.incremental.android=false
kotlin.caching.enabled=false
